# Production backend stack for a VPS (frontend is hosted on Vercel).
#
#   Vercel (FE) ──fetch /api/v1/* + wss /ws/*──▶ caddy :443 (https://API_DOMAIN)
#                                                   └─▶ api (uvicorn :8000)
#   mongodb, redis: internal "backend" network only (never published)
#
# Run from THIS directory (MonopolyBE/deploy):
#   cp .env.example .env   &&   edit secrets, API_DOMAIN, FRONTEND_ORIGIN
#   docker compose up -d --build
#
# The build context is ".." (the MonopolyBE root) so it can reach the Dockerfile
# and src/. On Vercel set NEXT_PUBLIC_API_URL = https://API_DOMAIN (see README.md).

name: monopoly-api

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      MONGODB_DB: ${MONGODB_DB:-monopoly}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # Comma-separated list of allowed FE origins (Vercel prod domain, custom
      # domain, etc.). MUST be exact origins — scheme + host, no trailing slash.
      CORS_ORIGINS: ${FRONTEND_ORIGIN}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      GAME_STARTING_BALANCE: ${GAME_STARTING_BALANCE:-1500}
      GO_SALARY: ${GO_SALARY:-200}
      JAIL_FINE: ${JAIL_FINE:-50}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend   # reach mongo/redis
      - edge      # reachable by caddy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      API_DOMAIN: ${API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # persists issued TLS certs — DO NOT lose this
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - edge

networks:
  backend:
    driver: bridge
  edge:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  caddy_data:
  caddy_config:
